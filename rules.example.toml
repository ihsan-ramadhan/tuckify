# rules.example.toml
# Copy this file to ~/.tuckify/rules.toml and adjust to your needs.
#
# Rules are executed top to bottom.
# Each file matches the first rule that fits — no multiple matches.
#
# Matching is case-insensitive:
#   extensions (.PDF == .pdf)
#   filename_patterns use glob syntax (* matches any characters)
#   filename_regex use Go regex syntax (automatic (?i) prefix is applied)
#
# Match examples:
#   extensions = [".pdf"]             → match by extension
#   filename_patterns = ["*Modul*"]   → match file containing "Modul"
#   filename_regex = ["^inv_\\d+$"]    → match file starting with inv_ followed by numbers (without extension)
#   locations = ["~/Downloads"]        → only apply rule to files inside ~/Downloads
#
# Template Tokens (for destination and rename paths):
#   {year}, {month}, {day}, {hour}, {minute}, {second}  → file modification time
#   {base}      → original name without extension
#   {ext}       → original extension (e.g. .pdf)
#   Modifiers:
#     {base:slug}   → slugified name (lowercase, alphanumeric + dashes)
#     {base:lower}  → lowercase
#     {base:upper}  → uppercase

[settings]
# strategy when a file with the same name already exists at the destination.
# "rename"           → append suffix _1, _2, etc. (default)
# "skip"             → leave the file, do not move
# "overwrite"        → replace the existing file
# "delete_duplicate" → delete source if content hash matches destination, fallback to rename if different
# "ask"              → prompt interactively: [O]verwrite, [S]kip, [R]ename
conflict_strategy = "rename"

# --- Documents ---

[[rule]]
name        = "PDF"
extensions  = [".pdf"]
locations   = ["~/Downloads"]
destination = "~/Documents/PDF"

[[rule]]
name        = "Word & spreadsheet"
extensions  = [".doc", ".docx", ".xls", ".xlsx", ".pptx"]
destination = "~/Documents/Office"

[[rule]]
name        = "Plain text"
extensions  = [".txt", ".md", ".csv"]
destination = "~/Documents/Text"

# --- Images ---

[[rule]]
name        = "Photos"
extensions  = [".jpg", ".jpeg", ".png", ".gif", ".webp", ".heic"]
locations   = ["~/Downloads", "~/Desktop"]
destination = "~/Pictures/Sorted"

[[rule]]
name        = "Design"
extensions  = [".psd", ".ai", ".figma", ".svg", ".xcf"]
destination = "~/Pictures/Design"

# --- Video & Audio ---

[[rule]]
name        = "Video"
extensions  = [".mp4", ".mkv", ".avi", ".mov", ".webm"]
destination = "~/Videos"

[[rule]]
name        = "Audio"
extensions  = [".mp3", ".wav", ".flac", ".aac", ".ogg"]
destination = "~/Music"

# --- Filename patterns ---
#
# Multiple matching methods can be combined.
# Rules match from top to bottom. Here, structured invoices match the regex first,
# and any remaining files starting with "invoice_" fall back to the next rule.

[[rule]]
name              = "Modul files"
filename_patterns = ["*modul*"]
destination       = "~/Documents/Modul"

[[rule]]
name            = "Structured invoices (regex)"
filename_regex  = ["^invoice_\\d{4}\\.pdf$"]
destination     = "~/Documents/Invoices/Verified"

[[rule]]
name              = "General Invoices (glob)"
filename_patterns = ["invoice_*"]
destination       = "~/Documents/Invoices"

# --- Downloads ---

[[rule]]
name        = "Archives"
extensions  = [".zip", ".tar", ".gz", ".rar", ".7z"]
destination = "~/Downloads/Archives"

[[rule]]
name        = "Installers"
extensions  = [".exe", ".dmg", ".deb", ".rpm", ".pkg", ".msi", ".appimage"]
destination = "~/Downloads/Installers"

# --- advanced features (size/age filters, copy/delete actions, renaming) ---

[[rule]]
name        = "copy new receipts"
extensions  = [".pdf"]
filename_patterns = ["*receipt*"]
destination = "~/Documents/Receipts"
action      = "copy"
max_age     = "7d"
max_size    = "5MB"

[[rule]]
name        = "archive old reports"
extensions  = [".pdf", ".docx"]
destination = "~/Documents/Archives/{year}/{month}"
rename      = "{base:slug}_archived{ext}"
min_age     = "30d"

[[rule]]
name        = "clean up large temp files"
extensions  = [".log", ".tmp"]
action      = "delete"
min_size    = "100MB"
