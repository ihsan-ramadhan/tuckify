pre-commit:
  commands:
    lint:
      run: golangci-lint run ./...
      fail_text: "Fix lint issues before committing"
    test:
      run: go test ./...
      fail_text: "Fix failing tests before committing"

pre-push:
  commands:
    test:
      run: go test ./...
      fail_text: "Fix failing tests before pushing"
