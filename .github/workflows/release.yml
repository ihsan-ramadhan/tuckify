name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build CLI binaries
        run: |
          mkdir -p dist
          GOOS=linux GOARCH=amd64 go build -o dist/tuckify-linux-amd64 ./cmd/tuckify
          GOOS=linux GOARCH=arm64 go build -o dist/tuckify-linux-arm64 ./cmd/tuckify
          GOOS=darwin GOARCH=amd64 go build -o dist/tuckify-darwin-amd64 ./cmd/tuckify
          GOOS=darwin GOARCH=arm64 go build -o dist/tuckify-darwin-arm64 ./cmd/tuckify
          GOOS=windows GOARCH=amd64 go build -o dist/tuckify-windows-amd64.exe ./cmd/tuckify
          GOOS=windows GOARCH=arm64 go build -o dist/tuckify-windows-arm64.exe ./cmd/tuckify

      - uses: actions/upload-artifact@v4
        with:
          name: cli-binaries
          path: dist/*

  build-gui:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: gui/build/bin/tuckify-gui
            release_name: tuckify-gui-linux-amd64
          - os: macos-latest
            artifact: gui/build/bin/tuckify-gui.app
            release_name: tuckify-gui-mac-universal.zip
          - os: windows-latest
            artifact: gui/build/bin/tuckify-gui.exe
            release_name: tuckify-gui-windows-amd64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install Linux Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Install Frontend Dependencies
        working-directory: gui/frontend
        run: npm install

      - name: Create dummy dist folder
        shell: bash
        run: |
          mkdir -p gui/frontend/dist
          touch gui/frontend/dist/index.html

      - name: Build Wails App (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          wails build -tags "desktop webkit2_41"
          mkdir -p dist-gui
          cp build/bin/tuckify-gui* dist-gui/${{ matrix.release_name }}

      - name: Build Wails App (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          wails build -tags desktop
          mkdir -p dist-gui
          cd build/bin
          zip -r ../../dist-gui/tuckify-gui-mac-universal.zip tuckify-gui.app

      - name: Build Wails App (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          wails build -tags desktop
          mkdir -p dist-gui
          cp build/bin/tuckify-gui* dist-gui/${{ matrix.release_name }}

      - uses: actions/upload-artifact@v4
        with:
          name: gui-binaries-${{ matrix.release_name }}
          path: dist-gui/*

  create-release:
    needs: [build-cli, build-gui]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v4
        with:
          name: cli-binaries
          path: dist

      - uses: actions/download-artifact@v4
        with:
          name: gui-binaries-tuckify-gui-linux-amd64
          path: dist

      - uses: actions/download-artifact@v4
        with:
          name: gui-binaries-tuckify-gui-windows-amd64.exe
          path: dist

      - uses: actions/download-artifact@v4
        with:
          name: gui-binaries-tuckify-gui-mac-universal.zip
          path: dist

      - name: Generate Checksums
        run: |
          cd dist
          sha256sum * > checksums.txt

      - uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          generate_release_notes: true
          draft: true
          files: |
            dist/*
            dist/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
