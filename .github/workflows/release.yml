name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binaries
        run: |
          mkdir -p dist
          # Linux amd64
          GOOS=linux GOARCH=amd64 go build -o dist/tuckify-linux-amd64 .
          # Linux arm64
          GOOS=linux GOARCH=arm64 go build -o dist/tuckify-linux-arm64 .
          # Darwin amd64
          GOOS=darwin GOARCH=amd64 go build -o dist/tuckify-darwin-amd64 .
          # Darwin arm64
          GOOS=darwin GOARCH=arm64 go build -o dist/tuckify-darwin-arm64 .
          # Windows amd64
          GOOS=windows GOARCH=amd64 go build -o dist/tuckify-windows-amd64.exe .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/tuckify-linux-amd64
            dist/tuckify-linux-arm64
            dist/tuckify-darwin-amd64
            dist/tuckify-darwin-arm64
            dist/tuckify-windows-amd64.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
