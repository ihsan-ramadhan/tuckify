<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>tuckify</title>
</head>
<body>
    <header>
        <div class="header-container">
            <span class="logo">tuckify</span>
            <nav class="tabs">
                <button class="tab-btn active" data-tab="dashboard">Dashboard</button>
                <button class="tab-btn" data-tab="rules">Rules Editor</button>
                <button class="tab-btn" data-tab="history">Run History</button>
            </nav>
        </div>
    </header>

    <main class="container">
        <!-- Dashboard / Schedules Tab -->
        <section id="dashboard" class="tab-content active">
            <div class="section-header">
                <h2>Schedules</h2>
                <button id="add-sched-btn" class="btn btn-primary">+ Add Schedule</button>
            </div>

            <!-- Add/Edit Schedule Card -->
            <div id="sched-form-card" class="card hidden">
                <h3 id="sched-form-title">New Schedule</h3>
                <form id="sched-form">
                    <input type="hidden" id="sched-orig-name">
                    <div class="form-group">
                        <label for="sched-name">Name</label>
                        <input type="text" id="sched-name" required placeholder="e.g. downloads-cleaner">
                    </div>
                    <div class="form-group">
                        <label for="sched-folders">Folders (comma separated)</label>
                        <input type="text" id="sched-folders" required placeholder="e.g. /home/user/Downloads, /home/user/Temp">
                    </div>
                    <div class="form-group">
                        <label for="sched-cron">Cron Schedule</label>
                        <input type="text" id="sched-cron" required placeholder="e.g. 0 0 * * * (daily at midnight)">
                    </div>
                    <div class="form-group">
                        <label for="sched-config">Config (rules path or raw TOML override)</label>
                        <input type="text" id="sched-config" placeholder="Leave empty for default rules.toml">
                    </div>
                    <div class="form-actions">
                        <button type="button" id="cancel-sched-btn" class="btn btn-secondary">Cancel</button>
                        <button type="submit" class="btn btn-primary">Save Schedule</button>
                    </div>
                </form>
            </div>

            <div id="schedules-list" class="schedules-grid">
                <!-- dynamically loaded -->
            </div>
        </section>

        <!-- Rules Editor Tab -->
        <section id="rules" class="tab-content">
            <div class="section-header">
                <h2>Rules Config</h2>
                <div class="rules-actions">
                    <button id="validate-rules-btn" class="btn btn-secondary">Validate</button>
                    <button id="save-rules-btn" class="btn btn-primary">Save Config</button>
                </div>
            </div>
            <div class="card">
                <label for="rules-textarea" class="visually-hidden">Rules Configuration</label>
                <textarea id="rules-textarea" class="rules-editor" placeholder="# tuckify rules.toml"></textarea>
                <div id="validation-alert" class="alert hidden"></div>
            </div>
        </section>

        <!-- Run History Tab -->
        <section id="history" class="tab-content">
            <div class="section-header">
                <h2>Execution History</h2>
            </div>
            <div class="card">
                <table class="table">
                    <thead>
                        <tr>
                            <th>Timestamp</th>
                            <th>Folders</th>
                            <th>Items Moved</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="history-rows">
                        <!-- dynamically loaded -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- Run Results Modal -->
    <div id="results-modal" class="modal hidden">
        <div class="modal-content card">
            <div class="modal-header">
                <h3>Run Results</h3>
                <button id="close-modal-btn" class="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <table class="table">
                    <thead>
                        <tr>
                            <th>File</th>
                            <th>Action</th>
                            <th>Destination</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="modal-results-rows">
                        <!-- dynamically loaded -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
