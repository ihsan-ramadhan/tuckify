<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>tuckify</title>
</head>
<body>
    <div id="app">
        <header class="header">
            <h1>tuckify</h1>
            <nav class="tabs">
                <button class="tab active" data-tab="dashboard">Dashboard</button>
                <button class="tab" data-tab="run-manual">Run</button>
                <button class="tab" data-tab="rules-builder">Rules</button>
                <button class="tab" data-tab="history">History</button>
            </nav>
        </header>

        <main class="content">
            <!-- Dashboard / Schedules Tab -->
            <section id="dashboard" class="tab-panel active">
                <!-- Summary Stats -->
                <div class="summary-grid" id="summary-stats">
                    <div class="summary-card">
                        <span class="summary-icon">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                        </span>
                        <div class="summary-stat" id="stat-rules">0</div>
                        <div class="summary-label">Rules</div>
                    </div>
                    <div class="summary-card">
                        <span class="summary-icon">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                        </span>
                        <div class="summary-stat" id="stat-schedules">0</div>
                        <div class="summary-label">Active Schedules</div>
                    </div>
                    <div class="summary-card">
                        <span class="summary-icon">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                        </span>
                        <div class="summary-stat" id="stat-last-run">--</div>
                        <div class="summary-label">Last Run</div>
                    </div>
                    <div class="summary-card">
                        <span class="summary-icon">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                        </span>
                        <div class="summary-stat" id="stat-total-runs">0</div>
                        <div class="summary-label">Runs This Week</div>
                    </div>
                </div>

                <!-- Schedules Section -->
                <div class="section-header">
                    <h2>Schedules</h2>
                    <div style="display:flex; gap:8px;">
                        <button id="startup-all-btn" class="btn btn-secondary">Start All</button>
                        <button id="unstartup-all-btn" class="btn btn-secondary">Stop All</button>
                        <button id="add-sched-btn" class="btn btn-primary">+ Add Schedule</button>
                    </div>
                </div>

                <!-- Add/Edit Schedule Modal (Floating) -->
                <div id="sched-modal" class="modal">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h3 id="sched-form-title">New Schedule</h3>
                            <button id="close-sched-modal" class="modal-close">&times;</button>
                        </div>
                        <div class="modal-body">
                            <form id="sched-form">
                                <input type="hidden" id="sched-orig-name">
                                <div class="form-group">
                                    <label for="sched-name">Schedule Name</label>
                                    <input type="text" id="sched-name" class="form-control" required placeholder="e.g. downloads-cleaner">
                                </div>
                                <div class="form-group">
                                    <label for="sched-folder">Folders Target (dipisah koma untuk multi-folder)</label>
                                    <div class="picker-wrapper">
                                        <input type="text" id="sched-folder" class="form-control" required placeholder="Pilih folder target atau pisah dengan koma...">
                                        <button type="button" id="browse-sched-folder" class="btn btn-secondary">📁 Browse...</button>
                                    </div>
                                </div>
                                <div class="form-group">
                                    <label for="sched-cron">Frequency</label>
                                    <select id="sched-cron" class="form-control">
                                        <option value="0 * * * *">Every Hour</option>
                                        <option value="0 */6 * * *">Every 6 Hours</option>
                                        <option value="0 12 * * *">Daily at Noon</option>
                                        <option value="0 0 * * *">Daily at Midnight</option>
                                        <option value="0 0 * * 0">Every Week (Sunday)</option>
                                        <option value="0 0 1 * *">Every Month (1st)</option>
                                        <option value="custom">Custom...</option>
                                    </select>
                                </div>
                                <div id="custom-cron-group" class="cron-builder hidden">
                                    <label>Custom Cron Schedule</label>
                                    <div class="cron-fields" id="cron-fields-container">
                                        <!-- Generated by JS -->
                                    </div>
                                    <div class="cron-preview">
                                        <span class="cron-preview-label">Cron expression:</span>
                                        <code id="cron-preview-value">* * * * *</code>
                                    </div>
                                </div>
                                <div class="form-group hidden">
                                    <label for="sched-config">Config Path</label>
                                    <input type="text" id="sched-config" class="form-control" placeholder="Leave empty for default">
                                </div>
                                <div class="form-actions">
                                    <button type="button" id="cancel-sched-btn" class="btn btn-secondary">Cancel</button>
                                    <button type="submit" class="btn btn-primary">Save Schedule</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>

                <div id="schedules-list" class="schedules-grid">
                    <!-- dynamically loaded -->
                </div>
            </section>

            <!-- Run Manual Tab -->
            <section id="run-manual" class="tab-panel">
                <div class="section-header">
                    <h2>Run Organizer Once</h2>
                </div>
                <div class="card" style="max-width: 600px; margin: 0 auto;">
                    <div class="form-group">
                        <label for="run-folder">Folders Target (dipisah koma untuk multi-folder)</label>
                        <div class="picker-wrapper">
                            <input type="text" id="run-folder" class="form-control" placeholder="Pilih folder target atau pisah dengan koma..." required>
                            <button type="button" id="browse-run-folder" class="btn btn-secondary">📁 Browse...</button>
                        </div>
                    </div>
                    <div style="display:flex; gap:12px; margin-top:24px;">
                        <button type="button" id="run-organize-btn" class="btn btn-primary" style="flex:1; justify-content:center;">▶ Run Organize</button>
                        <button type="button" id="run-dry-btn" class="btn btn-secondary" style="flex:1; justify-content:center;">🔍 Dry Run</button>
                    </div>
                </div>
            </section>

            <!-- Rules Builder Tab -->
            <section id="rules-builder" class="tab-panel">
                <div class="section-header">
                    <h2>Rules Configuration</h2>
                    <button type="button" id="add-rule-btn" class="btn btn-primary">+ Add New Rule</button>
                </div>
                
                <div class="card">
                    <div class="form-group" style="max-width: 350px; margin-bottom: 24px; border-bottom: 1px solid var(--border-subtle); padding-bottom: 16px;">
                        <label for="conflict-strategy">Duplicate Conflict Strategy</label>
                        <select id="conflict-strategy" class="form-control">
                            <option value="rename">Auto Rename (add suffix _1, _2)</option>
                            <option value="skip">Skip (leave existing file)</option>
                            <option value="overwrite">Overwrite (replace existing file)</option>
                            <option value="delete_duplicate">Delete Duplicate (remove source if identical)</option>
                            <option value="ask">Ask (prompt each time)</option>
                        </select>
                    </div>

                    <div id="rules-list" class="rules-list">
                        <!-- Rule cards loaded dynamically -->
                    </div>
                    
                    <div id="validation-alert" class="alert hidden"></div>

                    <div style="display:flex; justify-content:flex-end; gap:12px; margin-top:24px; border-top:1px solid var(--border-subtle); padding-top:20px;">
                        <button type="button" id="reset-rules-btn" class="btn btn-secondary">Discard</button>
                        <button type="button" id="save-rules-btn" class="btn btn-primary">Save Rules</button>
                    </div>
                </div>
            </section>

            <!-- Run History Tab -->
            <section id="history" class="tab-panel">
                <div class="section-header">
                    <h2>Run History</h2>
                </div>
                <div class="card">
                    <div class="table-wrapper">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th>Timestamp</th>
                                    <th>Source Folder</th>
                                    <th>Files Organized</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="history-rows">
                                <!-- dynamically loaded -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Run Results Modal -->
    <div id="results-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Run Results</h3>
                <button id="close-modal-btn" class="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <div class="table-wrapper">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>File</th>
                                <th>Action</th>
                                <th>Destination</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="modal-results-rows">
                            <!-- dynamically loaded -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Logs Modal -->
    <div id="logs-modal" class="modal">
        <div class="modal-content" style="max-width: 800px;">
            <div class="modal-header">
                <h3 id="logs-title">Schedule Logs</h3>
                <button id="close-logs-modal" class="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <pre id="logs-content" style="background: var(--bg-primary); padding: 15px; border-radius: 6px; font-family: monospace; font-size: 13px; color: var(--text-secondary); max-height: 400px; overflow-y: auto; white-space: pre-wrap; border: 1px solid var(--border-subtle);"></pre>
            </div>
        </div>
    </div>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
